<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Badge background circle - matches original streamlinehq check-badge style -->
  <circle cx="150" cy="150" r="145" fill="url(#grad1)"/>
  <!-- Subtle inner highlight -->
  <circle cx="150" cy="120" r="100" fill="white" fill-opacity="0.08"/>
  <!-- Badge notch decorations (8-point star badge shape) -->
  <path d="M150 10 L162 52 L204 40 L192 82 L234 94 L202 122 L214 164 L172 152 L150 190 L128 152 L86 164 L98 122 L66 94 L108 82 L96 40 L138 52 Z" fill="white" fill-opacity="0.12"/>
  <!-- Check mark - bold, centered -->
  <path d="M88 152 L128 192 L212 108" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F8EF7"/>
      <stop offset="100%" stop-color="#3B6FE8"/>
    </linearGradient>
  </defs>
</svg>
